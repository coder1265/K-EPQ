---
layout: contact
title: Contact
description: "Contact or visit lancaster produce"
custom_css:
- CSS/contact-page.css
---
      <section id="contact-section">
        <form id="form">
          <div class="field">
            <label for="name">Please enter your name:</label>
            <input
              type="text"
              name="name"
              id="name"
              autocomplete="name"
              required
            />
          </div>
          <div class="field">
            <label for="email1">Please enter your email address:</label>
            <input
              type="text"
              name="email"
              id="email1"
              autocomplete="email"
              required
            />
          </div>
          <div class="field">
            <input type="hidden" name="time" id="time" />
          </div>
          <div class="field">
            <label for="title">Please specify the subject of the email:</label>
            <input type="text" name="title" id="title" required />
          </div>
          <div class="field">
            <label for="message">Please enter the message of your email:</label>
            <textarea
              type="text"
              name="message"
              id="message"
              placeholder="message"
              rows="5"
              required
            ></textarea>
          </div>
          <input type="submit" id="button" disabled value="Send Email" />
        </form>
      </section>
